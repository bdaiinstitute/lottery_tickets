name: square_${algorithm}_${now:%Y-%m-%d}_${now:%H-%M-%S}_${seed}_ddim${model.ddim_steps}
logdir: ${log_dir}/robomimic-dsrl/${name}/${now:%Y-%m-%d}_${now:%H-%M-%S}_${seed}
base_policy_path: ./dppo/log/robomimic-pretrain/square/square_pre_diffusion_mlp_ta4_td100_ddim-100steps/2025-04-11_19-13-26_44/checkpoint/state_3000.pt
offline_data_path: ./dppo/log/robomimic/square_traj_data/train_offline.npz
normalization_path: ./dppo/log/robomimic/${env_name}/normalization.npz
dppo_path: ./dppo
exp_name: square_dsrl
algorithm: dsrl_sac
seed: 1619
device: cuda:0
use_wandb: true
env_name: square
log_dir: ./logs_res_rm
obs_dim: 23
action_dim: 7
cond_steps: 1
act_steps: 4
load_offline_data: false
deterministic_eval: false
eval_interval: 4000
num_evals: 200
save_model_interval: 50000
save_replay_buffer: false
env:
  n_envs: 4
  n_eval_envs: 25
  name: ${env_name}
  max_episode_steps: 400
  reset_at_iteration: false
  save_video: false
  best_reward_threshold_for_success: 1
  reward_offset: 1
  wrappers:
    robomimic_lowdim:
      normalization_path: ${normalization_path}
      low_dim_keys:
      - robot0_eef_pos
      - robot0_eef_quat
      - robot0_gripper_qpos
      - object
    multi_step:
      n_obs_steps: ${cond_steps}
      n_action_steps: ${act_steps}
      max_episode_steps: ${env.max_episode_steps}
      reset_within_step: true
wandb:
  project: lt_rm_baselines
  run: ${now:%H-%M-%S}_${name}
  group: robomimic-square
train:
  tau: 0.005
  actor_lr: 0.0003
  batch_size: 256
  train_freq: 1
  utd: 20
  noise_critic_grad_steps: 10
  use_layer_norm: true
  layer_size: 2048
  num_layers: 3
  discount: 0.999
  ent_coef: -1
  target_ent: 0.0
  init_rollout_steps: 2001
  action_magnitude: 1.5
  n_critics: 2
  critic_backup_combine_type: min
model:
  _target_: model.diffusion.diffusion_eval.DiffusionEval
  ft_denoising_steps: 0
  predict_epsilon: true
  denoised_clip_value: 1.0
  randn_clip_value: 3
  network_path: ${base_policy_path}
  network:
    _target_: model.diffusion.mlp_diffusion.DiffusionMLP
    time_dim: 32
    mlp_dims:
    - 1024
    - 1024
    - 1024
    cond_mlp_dims:
    - 512
    - 64
    residual_style: true
    cond_dim: ${eval:'${obs_dim} * ${cond_steps}'}
    horizon_steps: ${act_steps}
    action_dim: ${action_dim}
  horizon_steps: ${act_steps}
  obs_dim: ${obs_dim}
  action_dim: ${action_dim}
  denoising_steps: 100
  device: ${device}
  use_ddim: true
  ddim_steps: 8
  controllable_noise: true
