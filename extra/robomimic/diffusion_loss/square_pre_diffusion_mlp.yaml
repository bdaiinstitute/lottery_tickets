defaults:
  - _self_
hydra:
  run:
    dir: ${logdir}
_target_: noise_opt_rm.noise_search.diffusion_loss.EvalDiffusionLoss

name: ${env}_pre_diffusion_mlp_ta${horizon_steps}_td${denoising_steps}_steps
logdir: ./logs_res_rm/diffusion_loss/${name}/
dppo_path: ./dppo
base_policy_path: ${dppo_path}/log/robomimic-pretrain/square/square_pre_diffusion_mlp_ta4_td100_ddim-100steps/2025-04-11_19-13-26_44/checkpoint/state_3000.pt
train_dataset_path: ${dppo_path}/log/robomimic/${env}/train.npz
normalization_path: ${dppo_path}/log/robomimic/${env}/normalization.npz

seed: 44
device: cuda:0
env: square
obs_dim: 23
action_dim: 7
horizon_steps: 4
cond_steps: 1
denoising_steps: ${model.denoising_steps}

wandb:
  project: robomimic-diffusion-loss
  run: ${now:%H-%M-%S}_${name}

train:
  n_epochs: 3000
  batch_size: 256
  learning_rate: 1e-4
  weight_decay: 1e-6
  lr_scheduler:
    first_cycle_steps: 3000
    warmup_steps: 100
    min_lr: 1e-5
  save_model_freq: 500
  train_split: 0.75

model:
  _target_: model.diffusion.diffusion_eval.DiffusionEval
  ft_denoising_steps: 0
  predict_epsilon: True
  denoised_clip_value: 1.0
  randn_clip_value: 3
  network_path: ${base_policy_path}
  network:
    _target_: model.diffusion.mlp_diffusion.DiffusionMLP
    time_dim: 32
    mlp_dims: [1024, 1024, 1024]
    cond_mlp_dims: [512, 64]
    residual_style: True
    cond_dim: ${eval:'${obs_dim} * ${cond_steps}'}
    horizon_steps: ${horizon_steps}
    action_dim: ${action_dim}
  horizon_steps: ${horizon_steps}
  obs_dim: ${obs_dim}
  action_dim: ${action_dim}
  denoising_steps: 100
  device: ${device}
  use_ddim: True
  ddim_steps: 8
  controllable_noise: True

ema:
  decay: 0.995

train_dataset:
  _target_: agent.dataset.sequence.StitchedSequenceDataset
  dataset_path: ${train_dataset_path}
  horizon_steps: ${horizon_steps}
  cond_steps: ${cond_steps}
  device: ${device}